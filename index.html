<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Z Extemp Timer</title>
    <meta name="theme-color" content="#111827" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Z Timer" />
    <link rel="apple-touch-icon" href="logo.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }
      * { box-sizing: border-box; }
      html, body {
        height: 100%;
        margin: 0;
        background: #f9fafb;
        color: #111827;
      }
      body {
        position: relative;
        overflow-x: hidden;
      }
      .page-bg {
        position: fixed;
        inset: 0;
        background: url("logo.png") no-repeat center center;
        background-size: contain;
        opacity: 0.12;
        pointer-events: none;
        z-index: -1;
      }
      .app {
        min-height: 100vh;
        padding: 24px;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
      }
      h1 {
        font-size: clamp(1.75rem, 4vw, 2.25rem);
        margin: 0;
        text-align: center;
      }
      .title-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
      }
      .title-logo {
        width: auto;
        height: clamp(34px, 4.2vw, 56px);
        object-fit: contain;
      }
      .subtitle {
        margin: 4px 0 0;
        text-align: center;
        color: #4b5563;
        font-size: 0.92rem;
      }
      .clock {
        margin: 20px 0;
        text-align: center;
        font-size: clamp(3rem, 14vw, 7rem);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-weight: 700;
        letter-spacing: 0.09em;
      }
      .controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 12px;
        background: rgba(255,255,255,0.9);
        padding: 16px;
        border-radius: 18px;
        box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
      }
      .control {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .control label {
        font-size: 0.85rem;
        color: #4b5563;
      }
      .control input {
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 8px 10px;
        font-size: 1rem;
        background: #fff;
      }
      .table-wrap {
        margin-top: 20px;
        overflow-x: auto;
        background: rgba(255,255,255,0.9);
        border-radius: 18px;
        box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }
      th, td {
        padding: 8px;
        border-top: 1px solid #e5e7eb;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      th {
        background: #f3f4f6;
        text-align: left;
        font-size: 0.95rem;
      }
      td {
        text-align: center;
        font-size: clamp(0.95rem, 1.8vw, 1.2rem);
      }
      .highlight { background: #fef3c7; }
      .active { background: #bbf7d0; }
      .red { background: #fecaca; }
      .black { background: #111827; color: #fff; }
      .status-pill {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 999px;
        font-size: 0.74rem;
        font-weight: 600;
      }
      .status-prep { background: #fef3c7; color: #92400e; }
      .status-released { background: #dbeafe; color: #1e40af; }
      .status-speaking { background: #ede9fe; color: #5b21b6; }
      .status-done { background: #dcfce7; color: #166534; }
      .status-default { background: #f3f4f6; color: #374151; }
    </style>
  </head>
  <body>
    <div class="page-bg"></div>
    <main class="app">
      <div class="container">
        <div class="title-row">
          <img class="title-logo" src="logo.png" alt="School speech and debate logo" />
          <h1>Z Extemp Timer</h1>
          <img class="title-logo" src="logo.png" alt="School speech and debate logo" />
        </div>
        <p class="subtitle">Offline-capable timer app for Android and Windows via installable PWA.</p>
        <p class="subtitle">Install on iPhone/iPad: Open this page in Safari, tap Share, then choose Add to Home Screen.</p>
        <div class="clock" id="clock">--:--</div>

        <section class="controls">
          <div class="control"><label for="drawInterval">Draw Interval (min)</label><input id="drawInterval" type="number" min="1" value="9" /></div>
          <div class="control"><label for="releaseInterval">Release Interval (min)</label><input id="releaseInterval" type="number" min="0" value="0" /></div>
          <div class="control"><label for="callInterval">Call Interval (min)</label><input id="callInterval" type="number" min="0" value="1" /></div>
          <div class="control"><label for="speakerCount">Speakers</label><input id="speakerCount" type="number" min="1" value="6" /></div>
          <div class="control"><label for="roundBeginsAt">Round Begins At</label><input id="roundBeginsAt" type="time" /></div>
        </section>

        <section class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Speaker</th>
                <th>Draw</th>
                <th>15 min</th>
                <th>10 min</th>
                <th>5 min</th>
                <th>Release</th>
                <th>Speak</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="scheduleBody"></tbody>
          </table>
        </section>
      </div>
    </main>

    <script>
      function pad(n) { return String(n).padStart(2, '0'); }
      function fmtTime(d) { return `${pad(d.getHours())}:${pad(d.getMinutes())}`; }
      function fmtClock(d) { return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`; }
      function addMin(d, m) { return new Date(d.getTime() + m * 60000); }
      function parseHHMM(s) {
        if (!s) return null;
        const [h, m] = s.split(':').map(Number);
        const now = new Date();
        return new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0, 0);
      }

      const state = {
        drawInterval: 9,
        releaseInterval: 0,
        callInterval: 1,
        speakerCount: 6,
        roundBeginsAt: '',
        rows: []
      };

      const els = {
        clock: document.getElementById('clock'),
        drawInterval: document.getElementById('drawInterval'),
        releaseInterval: document.getElementById('releaseInterval'),
        callInterval: document.getElementById('callInterval'),
        speakerCount: document.getElementById('speakerCount'),
        roundBeginsAt: document.getElementById('roundBeginsAt'),
        scheduleBody: document.getElementById('scheduleBody')
      };

      function recalcRows() {
        const start = parseHHMM(state.roundBeginsAt);
        if (!start) {
          state.rows = [];
          renderTable();
          return;
        }
        const next = [];
        for (let i = 0; i < state.speakerCount; i++) {
          const draw = addMin(start, i * state.drawInterval);
          const m15 = addMin(draw, 15);
          const m10 = addMin(draw, 20);
          const m5 = addMin(draw, 25);
          const speak = addMin(draw, 30);
          const release = addMin(speak, -state.releaseInterval);
          next.push({
            id: `${i}`,
            speaker: `${i + 1}`,
            draw, m15, m10, m5, release, speak,
            call: addMin(draw, -state.callInterval)
          });
        }
        state.rows = next;
        renderTable();
      }

      function statusFor(row, now) {
        const callTime = row.call || addMin(row.draw, -state.callInterval);
        if (now < callTime) return 'Waiting to draw';
        if (now >= callTime && now < row.draw) return 'Call to table';
        if (now < row.release) {
          const minsLeft = Math.ceil((row.release - now) / 60000);
          return `Prep: ${minsLeft}m left`;
        }
        if (now < row.speak) return 'Released';
        if (now < addMin(row.speak, 7)) return 'Speaking';
        return 'Done';
      }

      function lastRedOffTime(rows) {
        const targets = rows.flatMap((r) => [r.draw, r.m15, r.m10, r.m5, r.release, r.speak]).filter(Boolean);
        if (!targets.length) return null;
        return addMin(targets.reduce((a, b) => (b > a ? b : a), targets[0]), 2);
      }

      function withCellClass(target, now, globalCutoff) {
        const diffMin = Math.abs((target - now) / 60000);
        const highlight = diffMin <= state.callInterval;
        const active = now >= target && now < addMin(target, 1);
        const red = now >= addMin(target, 1) && now < addMin(target, 2);
        const black = now >= addMin(target, 2) && (!globalCutoff || now < globalCutoff);
        if (active) return 'active';
        if (red) return 'red';
        if (black) return 'black';
        if (highlight) return 'highlight';
        return '';
      }

      function pillClass(status) {
        if (status.startsWith('Prep')) return 'status-prep';
        if (status === 'Released') return 'status-released';
        if (status === 'Speaking') return 'status-speaking';
        if (status === 'Done') return 'status-done';
        return 'status-default';
      }

      function renderTable() {
        const now = new Date();
        const cutoff = lastRedOffTime(state.rows);
        const rowsHtml = state.rows.map((row) => {
          const status = statusFor(row, now);
          return `
            <tr>
              <td class="${withCellClass(row.draw, now, cutoff)}">${row.speaker}</td>
              <td class="${withCellClass(row.draw, now, cutoff)}">${fmtTime(row.draw)}</td>
              <td class="${withCellClass(row.m15, now, cutoff)}">${fmtTime(row.m15)}</td>
              <td class="${withCellClass(row.m10, now, cutoff)}">${fmtTime(row.m10)}</td>
              <td class="${withCellClass(row.m5, now, cutoff)}">${fmtTime(row.m5)}</td>
              <td class="${withCellClass(row.release, now, cutoff)}">${fmtTime(row.release)}</td>
              <td class="${withCellClass(row.speak, now, cutoff)}">${fmtTime(row.speak)}</td>
              <td><span class="status-pill ${pillClass(status)}">${status}</span></td>
            </tr>
          `;
        }).join('');
        els.scheduleBody.innerHTML = rowsHtml;
      }

      function syncInputs() {
        state.drawInterval = Math.max(1, Number(els.drawInterval.value || 1));
        state.releaseInterval = Math.max(0, Number(els.releaseInterval.value || 0));
        state.callInterval = Math.max(0, Number(els.callInterval.value || 0));
        state.speakerCount = Math.max(1, Number(els.speakerCount.value || 1));
        state.roundBeginsAt = els.roundBeginsAt.value;
        recalcRows();
      }

      [els.drawInterval, els.releaseInterval, els.callInterval, els.speakerCount, els.roundBeginsAt]
        .forEach((el) => el.addEventListener('input', syncInputs));

      function tickClock() {
        const now = new Date();
        els.clock.textContent = fmtClock(now);
        renderTable();
      }
      setInterval(tickClock, 1000);
      syncInputs();
      tickClock();

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js'));
      }
    </script>
  </body>
</html>
