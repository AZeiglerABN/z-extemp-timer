<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Z Extemp Timer</title>
    <meta name="theme-color" content="#111827" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      html, body {
        overflow-x: hidden;
        height: 100%;
        margin: 0;
        padding: 0;
      }

      body {
        /* ✅ Full-page logo background */
        background: url("logo.png") no-repeat center center fixed;
        background-size: contain; /* show entire logo */
        background-color: #f9fafb; /* soft fallback */
        position: relative;
      }

      /* Optional semi-transparent overlay for readability */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-color: rgba(255,255,255,0.85);
        pointer-events: none;
        z-index: 0;
      }

      #root {
        position: relative;
        z-index: 1; /* ensure app content sits above overlay */
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useMemo } = React;
      function pad(n){ return String(n).padStart(2,'0'); }
      function fmtTime(d){ return `${pad(d.getHours())}:${pad(d.getMinutes())}`; }
      function addMin(d, m){ return new Date(d.getTime() + m*60000); }
      function parseHHMM(s){
        if(!s) return null;
        const [h,m] = s.split(':').map(Number);
        const now = new Date();
        return new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0, 0);
      }

      function ZExtempTimer(){
        const [drawInterval, setDrawInterval] = useState(9);
        const [releaseInterval, setReleaseInterval] = useState(0); // default 0
        const [callInterval, setCallInterval] = useState(1);
        const [speakerCount, setSpeakerCount] = useState(6);
        const [roundBeginsAt, setRoundBeginsAt] = useState('');
        const [rows, setRows] = useState([]);
        const [tick, setTick] = useState(0);

        useEffect(()=>{ const t=setInterval(()=>setTick(x=>x+1),1000); return ()=>clearInterval(t); },[]);
        const now = useMemo(()=>new Date(), [tick]);

        const lastRedOffTime = useMemo(() => {
          const targets = rows.flatMap((r) => [r.draw, r.m15, r.m10, r.m5, r.release, r.speak]).filter(Boolean);
          if (targets.length === 0) return null;
          let max = targets[0];
          for (const t of targets) if (t && t > max) max = t;
          return addMin(max, 2);
        }, [rows]);

        useEffect(()=>{
          const start = parseHHMM(roundBeginsAt);
          if(!start) return;
          const next = [];
          for(let i=0;i<speakerCount;i++){
            const draw = addMin(start, i*drawInterval);
            const m15 = addMin(draw, 15);
            const m10 = addMin(draw, 20);
            const m5  = addMin(draw, 25);
            const speak = addMin(draw, 30);
            const release = addMin(speak, -releaseInterval);
            next.push({
              id: `${i}`,
              speaker: `${i+1}`,
              draw, m15, m10, m5, release, speak,
              call: addMin(draw, -callInterval)
            });
          }
          setRows(next);
        }, [drawInterval, releaseInterval, callInterval, speakerCount, roundBeginsAt]);

        const statusFor = (r)=>{
          if(!r.draw) return '—';
          const callTime = r.call ?? addMin(r.draw, -callInterval);
          if(now < callTime) return 'Waiting to draw';
          if(now >= callTime && now < r.draw) return 'Call to table';
          if(now < r.release){
            const minsLeft = Math.ceil((r.release - now)/60000);
            return `Prep: ${minsLeft}m left`;
          }
          if(now < r.speak) return 'Released';
          if(now >= r.speak && now < addMin(r.speak, 7)) return 'Speaking';
          return 'Done';
        };

        const isWithinCallInterval = (targetTime) => {
          if(!targetTime) return false;
          const diffMin = Math.abs((targetTime - now) / 60000);
          return diffMin <= callInterval;
        };
        const isActiveOneMinute = (targetTime) => now >= targetTime && now < addMin(targetTime, 1);
        const isRedOneMinute = (targetTime) => now >= addMin(targetTime, 1) && now < addMin(targetTime, 2);
        const isBlackAfterRed = (targetTime) => {
          if(!targetTime) return false;
          if(lastRedOffTime && now >= lastRedOffTime) return false;
          return now >= addMin(targetTime, 2);
        };

        return (
          <div className="min-h-screen text-gray-900 p-6">
            <div className="max-w-6xl mx-auto space-y-6">
              <header className="text-center">
                <h1 className="text-3xl font-bold">Z Extemp Timer</h1>
                <p className="mt-1 text-sm text-gray-600">Set intervals and a start time to auto-generate the schedule.</p>
              </header>

              <div className="text-center text-6xl md:text-8xl font-mono font-bold tracking-widest">
                {fmtTime(now)}
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-5 gap-3 bg-white/90 p-4 rounded-2xl shadow">
                <Labeled label="Draw Interval (min)">
                  <input type="number" min={1} className="w-full border rounded-lg px-2 py-1"
                    value={drawInterval}
                    onChange={(e)=>setDrawInterval(Math.max(1, Number(e.target.value||1)))} />
                </Labeled>
                <Labeled label="Release Interval (min)">
                  <input type="number" min={0} className="w-full border rounded-lg px-2 py-1"
                    value={releaseInterval}
                    onChange={(e)=>setReleaseInterval(Math.max(0, Number(e.target.value||0)))} />
                </Labeled>
                <Labeled label="Call Interval (min)">
                  <input type="number" min={0} className="w-full border rounded-lg px-2 py-1"
                    value={callInterval}
                    onChange={(e)=>setCallInterval(Math.max(0, Number(e.target.value||0)))} />
                </Labeled>
                <Labeled label="Speakers">
                  <input type="number" min={1} className="w-full border rounded-lg px-2 py-1"
                    value={speakerCount}
                    onChange={(e)=>setSpeakerCount(Math.max(1, Number(e.target.value||1)))} />
                </Labeled>
                <Labeled label="Round Begins At">
                  <input type="time" className="w-full border rounded-lg px-2 py-1"
                    value={roundBeginsAt}
                    onChange={(e)=>setRoundBeginsAt(e.target.value)} />
                </Labeled>
              </div>

              <div className="bg-white/90 rounded-2xl shadow overflow-hidden">
                <table className="w-full text-xl md:text-2xl lg:text-3xl xl:text-4xl table-fixed">
                  <thead className="bg-gray-100 text-gray-700 text-sm md:text-base lg:text-lg">
                    <tr>
                      <Th>Speaker</Th>
                      <Th>Draw</Th>
                      <Th>15 min</Th>
                      <Th>10 min</Th>
                      <Th>5 min</Th>
                      <Th>Release</Th>
                      <Th>Speak</Th>
                      <Th>Status</Th>
                    </tr>
                  </thead>
                  <tbody>
                    {rows.map((r)=> (
                      <tr key={r.id} className="border-t text-center">
                        <Td highlight={isWithinCallInterval(r.draw)} active={isActiveOneMinute(r.draw)} red={isRedOneMinute(r.draw)} black={isBlackAfterRed(r.draw)}>{r.speaker}</Td>
                        <Td highlight={isWithinCallInterval(r.draw)} active={isActiveOneMinute(r.draw)} red={isRedOneMinute(r.draw)} black={isBlackAfterRed(r.draw)}>{fmtTime(r.draw)}</Td>
                        <Td highlight={isWithinCallInterval(r.m15)} active={isActiveOneMinute(r.m15)} red={isRedOneMinute(r.m15)} black={isBlackAfterRed(r.m15)}>{fmtTime(r.m15)}</Td>
                        <Td highlight={isWithinCallInterval(r.m10)} active={isActiveOneMinute(r.m10)} red={isRedOneMinute(r.m10)} black={isBlackAfterRed(r.m10)}>{fmtTime(r.m10)}</Td>
                        <Td highlight={isWithinCallInterval(r.m5)} active={isActiveOneMinute(r.m5)} red={isRedOneMinute(r.m5)} black={isBlackAfterRed(r.m5)}>{fmtTime(r.m5)}</Td>
                        <Td highlight={isWithinCallInterval(r.release)} active={isActiveOneMinute(r.release)} red={isRedOneMinute(r.release)} black={isBlackAfterRed(r.release)} className="font-medium">{fmtTime(r.release)}</Td>
                        <Td highlight={isWithinCallInterval(r.speak)} active={isAct
